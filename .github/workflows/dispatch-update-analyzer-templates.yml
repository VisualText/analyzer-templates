name: Dispatch update-analyzer-templates

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - nlp-engine-linux
          - nlp-engine-windows
          - nlp-engine-mac
          - visualtext-files
    steps:
      - name: Trigger ${{ matrix.repo }}
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.CLASSIC_PAT }}
          repository: VisualText/${{ matrix.repo }}
          event-type: analyzer-templates-release
          client-payload: '{"tag_name": "${{ github.ref_name }}"}'
        continue-on-error: true
